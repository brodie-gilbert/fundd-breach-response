    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(26,42,58,0.95);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--white); }

  .header-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: fixed;
    top: 56px; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.1);
    z-index: 99;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal);
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── CARD STAGE ── */
  .stage {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px 40px;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 56px 52px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 32px 80px rgba(0,0,0,0.35);
    animation: slideUp 0.4s ease;
    position: relative;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card.exit {
    animation: slideOut 0.3s ease forwards;
  }
  @keyframes slideOut {
    to { opacity: 0; transform: translateY(-20px); }
  }

  /* ── STEP LABEL ── */
  .step-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--teal);
    margin-bottom: 14px;
  }

  /* ── QUESTION ── */
  .question {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .sub {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.5;

    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;

    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;

    border-radius: 12px;

    background: var(--white);
    text-align: left;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    position: relative;

    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateX(4px);
  }

  .option.selected {
    border-color: var(--teal);

    align-items: center;
    justify-content: center;

// ── SEVERITY LOGIC ─────────────────────────────────────
function getSeverity() {
  const { type, scope, data } = state;

  // SEV-1: Critical
  if (type === 'ransomware') return 1;
  if (type === 'exfil' && (scope === 'critical' || data === 'yes')) return 1;
  if (type === 'creds' && scope === 'critical') return 1;

  // SEV-2: High
  if (type === 'exfil') return 2;
  if (type === 'creds' && (scope === 'high' || data === 'yes' || data === 'unknown')) return 2;
  if (type === 'malware' && scope === 'critical') return 2;
  if (scope === 'critical' && data !== 'no') return 2;

  // SEV-3: Medium
  if (type === 'phishing' && data === 'no') return 3;
  if (type === 'malware' && scope === 'high') return 3;
  if (type === 'creds' && scope === 'low' && data === 'no') return 3;

  // SEV-4: Low / informational
  if (type === 'phishing' && scope === 'low') return 4;
  if (type === 'other' && scope === 'low' && data === 'no') return 4;

  // Default based on data involvement
  if (data === 'yes') return 2;
  if (data === 'unknown') return 2;
  return 3;
}

// ── NAVIGATION ─────────────────────────────────────────
function go(screenNum) {
  const oldCard = document.getElementById('card');
  oldCard.classList.add('exit');

  setTimeout(() => {
    oldCard.classList.remove('exit');
    document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
    const next = document.getElementById('screen-' + screenNum);
    if (next) next.classList.remove('hidden');

    if (screenNum === 4) buildSeverityScreen();
    if (screenNum === 5) buildActionScreen();
    if (screenNum === 6) buildPostScreen();

    currentScreen = screenNum;
    updateProgress();
    window.scrollTo(0, 0);
  }, 280);
}

function selectAndGo(key, value, nextScreen) {
  state[key] = value;
  go(nextScreen);
}

function restart() {
  state.type = null; state.scope = null; state.data = null;
  go(0);
}

function updateProgress() {
  const pct = (currentScreen / totalScreens) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── BUILD SCREENS ──────────────────────────────────────
function buildSeverityScreen() {
  const sev = getSeverity();
  const d = SEV_DATA[sev];

  document.getElementById('sev-badge-area').innerHTML =
    `<div class="sev-badge ${d.cls}">${d.icon} ${d.label} <span class="sla-tag">⏱ ${d.sla}</span></div>`;
  document.getElementById('sev-title').textContent = d.title;
  document.getElementById('sev-desc').textContent = d.desc;
  document.getElementById('sev-alert-area').innerHTML = d.alertHtml;

  // Show privacy/legal contacts only for SEV-1/2 or data involvement
  const showExtra = sev <= 2 || state.data === 'yes' || state.data === 'unknown';
  document.getElementById('privacy-contact-row').style.display = showExtra ? '' : 'none';
  document.getElementById('legal-contact-row').style.display = showExtra ? '' : 'none';
}

function buildActionScreen() {
  const sev = getSeverity();
  const d = SEV_DATA[sev];

  document.getElementById('sev-badge-area-2').innerHTML =
    `<div class="sev-badge ${d.cls}" style="margin-bottom:16px">${d.icon} ${d.label}</div>`;

  // Checklist
  const cl = document.getElementById('checklist');
  cl.innerHTML = d.checklistItems.map(item => `
    <div class="check-item" onclick="toggleCheck(this)">
      <div class="checkbox">✓</div>
      <span>${item}</span>
    </div>
  `).join('');

  // Accordion
  const acc = document.getElementById('accordion');
  acc.innerHTML = d.steps.map((step, i) => `
    <div class="acc-item">
      <div class="acc-header" onclick="toggleAcc(this)">
        <span>${step.title}</span>
        <span class="acc-arrow">▼</span>
      </div>
      <div class="acc-body">
        <ul>
          ${step.actions.map(a => `<li>${a}</li>`).join('')}
        </ul>
      </div>
    </div>
  `).join('');

  // NDB notice
  const showNDB = state.data === 'yes' || state.data === 'unknown';
  document.getElementById('ndb-notice').classList.toggle('hidden', !showNDB);
}

function buildPostScreen() {
  const showNDB = state.data === 'yes' || state.data === 'unknown' || getSeverity() === 1;
  const ndbStep = document.getElementById('ndb-step');
  ndbStep.style.display = showNDB ? 'flex' : 'none';

  const sev = getSeverity();
  const monitorNum = showNDB ? 4 : 3;
  document.getElementById('monitor-step-num').textContent = monitorNum;

  if (sev === 1) {
    document.getElementById('monitor-detail').textContent = 'Monitor all systems closely for 72 hours post-recovery for signs of re-infection';
  } else if (sev === 2) {
    document.getElementById('monitor-detail').textContent = 'Monitor affected systems for 48 hours post-recovery';
  } else {
    document.getElementById('monitor-title').textContent = 'Stay Vigilant';
    document.getElementById('monitor-detail').textContent = 'Keep an eye out for similar indicators over the next few weeks and report anything unusual';
  }
}

// ── UI HELPERS ─────────────────────────────────────────
function toggleCheck(el) {
  el.classList.toggle('checked');
  const box = el.querySelector('.checkbox');
  box.textContent = el.classList.contains('checked') ? '✓' : '✓';
}

function toggleAcc(header) {
  const body = header.nextElementSibling;
  const isOpen = header.classList.contains('open');

  document.querySelectorAll('.acc-header').forEach(h => h.classList.remove('open'));
  document.querySelectorAll('.acc-body').forEach(b => b.classList.remove('open'));

  if (!isOpen) {
    header.classList.add('open');
    body.classList.add('open');
  }
}

// Keyboard shortcuts for options
document.addEventListener('keydown', (e) => {
  const key = e.key.toUpperCase();
  const opts = document.querySelectorAll(`#screen-${currentScreen} .option`);
  const idx = ['A','B','C','D','E','F'].indexOf(key);
  if (idx >= 0 && opts[idx]) opts[idx].click();
  if (e.key === 'Enter' && currentScreen === 0) go(1);
});
